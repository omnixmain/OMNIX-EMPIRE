    <style>
        :root {
            --primary: #00e5ff;
            --secondary: #7000ff;
            --bg-dark: #0a0b1e;
            --card-bg: rgba(255, 255, 255, 0.05);
            --text-main: #e0e0e0;
            --accent-gradient: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            margin: 0;
            overflow-x: hidden;
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(0, 229, 255, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(112, 0, 255, 0.05) 0%, transparent 40%);
        }

        .premium-header {
            background: rgba(10, 11, 30, 0.8);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(0, 229, 255, 0.2);
            position: sticky;
            top: 0;
            z-index: 1000;
            padding: 1rem 0;
        }

        .logo-text {
            font-family: 'Orbitron', sans-serif;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: bold;
            font-size: 1.5rem;
            letter-spacing: 2px;
        }

        .glass-card {
            background: var(--card-bg);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        .glass-card:hover {
            transform: translateY(-8px);
            border-color: var(--primary);
            box-shadow: 0 10px 30px rgba(0, 229, 255, 0.2);
        }

        .live-badge {
            background: #ff0055;
            color: white;
            padding: 2px 10px;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: bold;
            text-transform: uppercase;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.6; }
            100% { opacity: 1; }
        }

        .btn-premium {
            background: var(--accent-gradient);
            color: white;
            padding: 8px 20px;
            border-radius: 8px;
            font-weight: 600;
            transition: filter 0.3s;
        }

        .btn-premium:hover {
            filter: brightness(1.2);
        }

        /* Player Modal */
        #player-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            z-index: 2000;
            backdrop-filter: blur(15px);
        }

        .player-container {
            width: 95%;
            max-width: 1100px;
            aspect-ratio: 16/9;
            background: #000;
            margin: auto;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 50px rgba(0, 229, 255, 0.3);
            border: 1px solid rgba(0, 229, 255, 0.2);
            border-radius: 12px;
            overflow: hidden;
        }

        .close-player {
            position: absolute;
            top: 15px;
            right: 20px;
            color: white;
            font-size: 2rem;
            cursor: pointer;
            z-index: 2100;
            text-shadow: 0 0 10px rgba(0,0,0,0.5);
            transition: transform 0.3s;
        }
        
        .close-player:hover {
            transform: scale(1.1);
            color: var(--primary);
        }

        /* Loader */
        .cyber-loader {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(0, 229, 255, 0.1);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>

<body class="pb-10">

<header class="premium-header">
    <div class="container mx-auto px-4 flex justify-between items-center">
        <div class="flex items-center gap-3">
            <img src="https://images.slivcdn.com/UI_icons/sonyliv_new_revised_header_logo.png" alt="SonyLIV" class="h-8 md:h-10">
            <span class="logo-text">SPORTS LIVE</span>
        </div>
        <div id="event-stats" class="text-[10px] md:text-sm font-semibold tracking-wider opacity-90 hidden sm:block">
            SYNCING LIVE DATA...
        </div>
    </div>
</header>

<main class="container mx-auto px-4 py-8">
    <div id="loader" class="flex flex-col items-center justify-center py-20">
        <div class="cyber-loader mb-4"></div>
        <p class="text-cyan-400 font-semibold tracking-[0.2em] uppercase text-xs">Synchronizing Streams...</p>
    </div>

    <div id="matches-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
        <!-- Cards will be injected here -->
    </div>
</main>

<!-- ArtPlayer Modal -->
<div id="player-modal">
    <span class="close-player" onclick="closePlayer()"><i class="fas fa-times"></i></span>
    <div class="player-container">
        <div id="artplayer" class="w-full h-full"></div>
    </div>
</div>

<script>
    const API1 = 'https://raw.githubusercontent.com/drmlive/sliv-live-events/main/sonyliv.json';
    const API2 = 'https://raw.githubusercontent.com/doctor-8trange/zyphora/refs/heads/main/data/sony.json';
    
    let art;
    let autoUpdateInterval;

    async function fetchData() {
        try {
            const [res1, res2] = await Promise.all([
                fetch(API1).then(r => r.json()).catch(e => ({ matches: [] })),
                fetch(API2).then(r => r.json()).catch(e => ({ data: [] }))
            ]);

            const mergedData = mergeStreams(res1.matches || [], res2.data || []);
            renderMatches(mergedData);
            updateStats(mergedData);
        } catch (error) {
            console.error('Failed to fetch data:', error);
            const loader = document.getElementById('loader');
            if (loader) {
                loader.innerHTML = '<div class="text-center"><i class="fas fa-exclamation-triangle text-4xl text-red-500 mb-4"></i><p class="text-red-400 font-semibold">Uplink Interrupted. Reconnecting...</p></div>';
            }
        }
    }

    function mergeStreams(matches, data) {
        const streamMap = new Map();

        // Process API 1 (DRMLive)
        matches.forEach(m => {
            const id = m.contentId.toString();
            streamMap.set(id, {
                id: id,
                name: m.match_name || m.event_name,
                category: m.event_category || 'Sports',
                isLive: m.isLive,
                image: m.src,
                channel: m.broadcast_channel,
                urls: m.video_url ? [{ label: 'Source 1 (Main)', url: m.video_url }] : []
            });
        });

        // Process API 2 (Doctor Strange)
        data.forEach(d => {
            const id = d.contentId.toString();
            let existing = streamMap.get(id);
            
            if (!existing) {
                existing = {
                    id: id,
                    name: d.video_info.episodeTitle || d.video_info.title,
                    category: d.video_info.genres[0] || 'Sports',
                    isLive: true,
                    image: d.image_cdn.landscape_thumb || d.image_cdn.thumbnail,
                    channel: d.stream_info.broadcast_channel,
                    urls: []
                };
            }

            // Extract more URLs from API 2
            if (d.MULTIPLE_AUDIO_LINKS) {
                d.MULTIPLE_AUDIO_LINKS.forEach(audio => {
                    // Try to get JitendraUnatti source or just any source
                    const playback = audio.DATA.JITENDRAUNATTI ? audio.DATA.JITENDRAUNATTI.Playback_videoURL : null;
                    if (playback) {
                        existing.urls.push({
                            label: `${audio.LANGUAGE}`,
                            url: playback
                        });
                    }
                });
            } else if (d.stream_info.dai_asset_key && d.stream_info.dai_asset_key.includes('.m3u8')) {
                 existing.urls.push({ label: 'HLS Stream', url: d.stream_info.dai_asset_key });
            }

            streamMap.set(id, existing);
        });

        return Array.from(streamMap.values());
    }

    function renderMatches(matches) {
        const grid = document.getElementById('matches-grid');
        const loader = document.getElementById('loader');
        if (!grid) return;
        
        grid.innerHTML = '';
        if (loader) loader.style.display = 'none';

        if (matches.length === 0) {
            grid.innerHTML = '<div class="col-span-full text-center py-20 opacity-50"><p>No live events detected.</p></div>';
            return;
        }

        matches.sort((a, b) => (b.isLive ? 1 : 0) - (a.isLive ? 1 : 0));

        matches.forEach(match => {
            const card = document.createElement('div');
            card.className = 'glass-card animate__animated animate__fadeInUp';
            
            const hasStreams = match.urls.length > 0;
            const streamsHtml = match.urls.map((u, index) => `
                <button onclick="initPlayer('${u.url}', '${match.name.replace(/'/g, "\\'")}')" class="btn-premium flex-1 text-xs py-2 flex items-center justify-center gap-2">
                    <i class="fas fa-play-circle"></i> ${u.label}
                </button>
            `).join('');
            
            card.innerHTML = `
                <div class="relative group cursor-pointer" onclick="${hasStreams ? `initPlayer('${match.urls[0].url}', '${match.name.replace(/'/g, "\\'")}')` : ''}">
                    <img src="${match.image}" alt="${match.name}" class="w-full h-44 object-cover transition-transform duration-500 group-hover:scale-105" onerror="this.src='https://origin-staticv2.sonyliv.com/videoasset_images/manage_file/1000006849/1755855925877711_Bundesliga2025_26_Match_Masthead_logo_LIVE.png'">
                    <div class="absolute inset-0 bg-gradient-to-t from-black/80 via-transparent to-transparent opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center">
                        ${hasStreams ? '<i class="fas fa-play text-4xl text-cyan-400"></i>' : ''}
                    </div>
                    <div class="absolute top-3 left-3 flex gap-2">
                        ${match.isLive ? '<span class="live-badge">Live</span>' : '<span class="bg-gray-800/80 backdrop-blur-sm text-gray-300 px-2 py-1 rounded text-[10px] font-bold uppercase">Upcoming</span>'}
                        <span class="bg-cyan-500/20 backdrop-blur-md border border-cyan-500/30 px-2 py-1 rounded text-[10px] text-cyan-300 font-bold uppercase">${match.category}</span>
                    </div>
                </div>
                <div class="p-4 flex flex-col flex-grow">
                    <h3 class="text-sm md:text-md font-bold text-white mb-2 line-clamp-2 min-h-[2.5rem]">${match.name}</h3>
                    <div class="mt-auto">
                        <p class="text-[10px] text-gray-500 mb-3 flex items-center gap-2">
                            <i class="fas fa-broadcast-tower text-indigo-400"></i> ${match.channel || 'SonyLIV Web Source'}
                        </p>
                        <div class="flex flex-col gap-2">
                            ${streamsHtml}
                            ${!hasStreams ? '<button disabled class="bg-white/5 text-gray-600 w-full py-2 rounded-lg text-xs font-semibold border border-white/5">Signal Status: Pending</button>' : ''}
                        </div>
                    </div>
                </div>
            `;
            grid.appendChild(card);
        });
    }

    function updateStats(matches) {
        const stats = document.getElementById('event-stats');
        if (!stats) return;
        const live = matches.filter(m => m.isLive && m.urls.length > 0).length;
        stats.innerHTML = `<i class="fas fa-radar-dot animate-ping text-cyan-500 mr-2"></i> <span class="text-cyan-400 font-bold">${live}</span> LIVE ACTIVE STREAMS`;
        stats.classList.remove('hidden');
    }

    function initPlayer(url, title) {
        if (!url) return;
        
        const modal = document.getElementById('player-modal');
        modal.style.display = 'block';
        document.body.style.overflow = 'hidden';
        window.adsPaused = true;

        if (art) art.destroy();

        art = new Artplayer({
            container: '#artplayer',
            url: url,
            title: title,
            type: 'm3u8',
            fullscreen: true,
            fullscreenWeb: false,
            autoplay: true,
            pip: true,
            setting: true,
            playbackRate: true,
            aspectRatio: true,
            autoSize: true,
            customType: {
                m3u8: function (video, url) {
                    if (Hls.isSupported()) {
                        const hls = new Hls();
                        hls.loadSource(url);
                        hls.attachMedia(video);
                    } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                        video.src = url;
                    }
                },
            },
        });

        art.on('ready', () => {
            console.log('Player ready');
        });
    }

    function closePlayer() {
        document.getElementById('player-modal').style.display = 'none';
        document.body.style.overflow = 'auto';
        window.adsPaused = false;
        if (art) {
            art.pause();
            art.destroy();
        }
    }

    // Modal click close
    document.getElementById('player-modal').addEventListener('click', function(e) {
        if (e.target === this) closePlayer();
    });

    // Initialize
    fetchData();
    // Auto refresh every 2 minutes for live status updates
    setInterval(fetchData, 120000);
</script>
