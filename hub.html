<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OMNIX HUB | Watch Movies Free</title>
    <meta name="description"
        content="OMNIX HUB - The ultimate destination for free high-quality movies and series. Browse categories, search titles, and stream instantly.">
    <link rel="stylesheet" href="hub.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>

<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">
                <a href="index.html">
                    <img src="omnix-empire-logo.jpg" alt="OMNIX HUB">
                    <span>OMNIX HUB</span>
                </a>
            </div>
            <div class="search-bar">
                <input type="text" id="movieSearch" placeholder="Search for movies, genres...">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="11" cy="11" r="8"></circle>
                    <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                </svg>
            </div>
        </div>
    </nav>

    <header class="hero">
        <div class="hero-content">
            <h1>Unlimited Movies,<br>Zero Cost.</h1>
            <p>Stream the latest Bollywood, Hollywood, and South Indian cinema. Grouped by your favorite categories.</p>
            <button class="primary-btn"
                onclick="document.getElementById('movies-container').scrollIntoView({behavior: 'smooth'})">Start
                Browsing</button>
        </div>
    </header>

    <main id="movies-container" class="container">
        <!-- Categories will be injected here -->
        <div id="loader" class="loader-container">
            <div class="loader"></div>
            <p>Fetching movies from OMNIX Empire...</p>
        </div>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2026 OMNIX HUB. Premium Entertainment.</p>
        </div>
    </footer>

    <script src="hub.js"></script>
    <script src="ads.js"></script>
</body>

</html>
