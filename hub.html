<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OMNIX HUB | Watch Movies Free</title>
    <meta name="description"
        content="OMNIX HUB - The ultimate destination for free high-quality movies and series. Browse categories, search titles, and stream instantly.">
    <link rel="stylesheet" href="hub.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <meta http-equiv="Content-Security-Policy" content="upgrade-insecure-requests">
</head>

<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">
                <a href="index.html">
                    <span style="color:white; font-size:1.8rem; font-weight:800;">OMNIX HUB</span>
                </a>
            </div>
            <div class="nav-actions" style="display: flex; align-items: center; gap: 15px;">
                <div class="search-bar">
                    <input type="text" id="movieSearch" placeholder="Search for movies, genres...">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="11" cy="11" r="8"></circle>
                        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                    </svg>
                </div>
                <a href="https://t.me/omnix_Empire" target="_blank" class="tg-join-btn"
                    style="display: flex; align-items: center; gap: 8px; background: #2AABEE; color: white; text-decoration: none; padding: 8px 16px; border-radius: 20px; font-weight: 600; font-size: 0.95rem; transition: all 0.3s ease;">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <line x1="22" y1="2" x2="11" y2="13"></line>
                        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                    </svg>
                    <span class="tg-text">Telegram</span>
                </a>
            </div>
        </div>
    </nav>

    <!-- Category Bar with Scroll Arrows -->
    <div class="category-wrapper">
        <button class="cat-scroll-btn cat-scroll-left" onclick="scrollCategories(-200)"
            aria-label="Scroll Left">&#8249;</button>
        <div class="category__bar" id="categoryBar">
            <!-- Categories will be injected here dynamically -->
        </div>
        <button class="cat-scroll-btn cat-scroll-right" onclick="scrollCategories(200)"
            aria-label="Scroll Right">&#8250;</button>
    </div>

    <main class="container">

        <!-- Latest Movies Grid -->
        <div id="movies-container" class="movies-grid-full">
            <!-- Loader -->
            <div id="loader" class="loader-container">
                <div class="loader"></div>
                <p>Fetching latest movies...</p>
            </div>
            <!-- Movies injected here -->
        </div>

        <!-- Pagination -->
        <div class="pagination" id="pagination-controls">
            <!-- Pagination buttons injected here -->
        </div>

    </main>

    <footer>
        <div class="container">
            <p>&copy; 2026 OMNIX HUB. Premium Entertainment.</p>
        </div>
    </footer>

    <script src="hub.js"></script>
    <script src="ads.js"></script>
    <script>
        function scrollCategories(amount) {
            const bar = document.getElementById('categoryBar');
            bar.scrollBy({ left: amount, behavior: 'smooth' });
        }
    </script>
</body>

</html>
