<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OMNIX PREMIUM PLAYER</title>
    <!-- Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@500;700;900&display=swap"
        rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Shaka Player -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.7/shaka-player.ui.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.7/controls.min.css">

    <style>
        :root {
            --neon-cyan: #66FCF1;
            --neon-blue: #45A29E;
            --dark-bg: #0B0C10;
            --glass-bg: rgba(31, 40, 51, 0.7);
            --live-red: #ff3333;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #000;
            color: #fff;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* Premium Loader */
        #player-loader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--dark-bg);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            transition: opacity 0.5s ease;
        }

        .loader-logo {
            font-family: 'Outfit', sans-serif;
            font-size: 2.5rem;
            font-weight: 900;
            color: var(--neon-cyan);
            letter-spacing: 4px;
            margin-bottom: 2rem;
            text-shadow: 0 0 20px rgba(102, 252, 241, 0.5);
            animation: pulse 2s infinite ease-in-out;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(102, 252, 241, 0.1);
            border-top: 3px solid var(--neon-cyan);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 0.7;
            }

            50% {
                opacity: 1;
            }
        }

        /* Overhead Controls */
        .player-top-bar {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            padding: 1.5rem 2rem;
            display: flex;
            align-items: center;
            background: linear-gradient(to bottom, rgba(0, 0, 0, 0.8) 0%, transparent 100%);
            z-index: 100;
            transition: opacity 0.3s ease;
        }

        .back-nav {
            background: var(--glass-bg);
            border: 1px solid rgba(102, 252, 241, 0.2);
            color: white;
            width: 45px;
            height: 45px;
            border-radius: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            backdrop-filter: blur(10px);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            margin-right: 1.5rem;
        }

        .back-nav:hover {
            background: var(--neon-cyan);
            color: #000;
            transform: scale(1.1);
        }

        .stream-info {
            display: flex;
            flex-direction: column;
        }

        .stream-title {
            font-family: 'Outfit', sans-serif;
            font-size: 1.4rem;
            font-weight: 700;
            color: #fff;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.5);
        }

        .stream-meta {
            font-size: 0.85rem;
            color: var(--neon-cyan);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 2px;
            opacity: 0.8;
        }

        /* Main Container */
        .video-wrapper {
            width: 100%;
            height: 100%;
            background: #000;
            position: relative;
        }

        #omnix-video {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        /* Error Overlay */
        .error-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 2rem;
            z-index: 200;
        }

        .error-card {
            background: var(--glass-bg);
            padding: 3rem;
            border-radius: 24px;
            border: 1px solid rgba(255, 51, 51, 0.3);
            max-width: 500px;
            backdrop-filter: blur(15px);
        }

        .error-card i {
            font-size: 4rem;
            color: var(--live-red);
            margin-bottom: 1.5rem;
            filter: drop-shadow(0 0 10px rgba(255, 51, 51, 0.5));
        }

        .error-card h2 {
            font-family: 'Outfit', sans-serif;
            margin-bottom: 1rem;
        }

        .error-card p {
            color: #ccc;
            line-height: 1.6;
            margin-bottom: 2rem;
        }

        .retry-btn {
            background: var(--live-red);
            color: white;
            border: none;
            padding: 1rem 2rem;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .retry-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255, 51, 51, 0.4);
        }

        /* Shaka Controls Theme Overrides */
        .shaka-controls-container {
            font-family: 'Inter', sans-serif !important;
        }

        .shaka-range-element {
            --shaka-range-track-color: rgba(255, 255, 255, 0.2);
            --shaka-range-fill-color: var(--neon-cyan) !important;
        }
    </style>
</head>

<body>

    <!-- Premium Loader Layer -->
    <div id="player-loader">
        <div class="loader-logo">OMNIX PLAY</div>
        <div class="spinner"></div>
    </div>

    <!-- Header UI -->
    <div class="player-top-bar" id="playerUIHead">
        <button class="back-nav" id="backBtn"><i class="fa-solid fa-chevron-left"></i></button>
        <div class="stream-info">
            <h1 class="stream-title" id="displayTitle">PREMIUM STREAM</h1>
            <span class="stream-meta" id="displaySource">OMNIX NETWORK</span>
        </div>
    </div>

    <!-- Primary Video Container -->
    <div class="video-wrapper" id="videoContainer" data-shaka-player-container>
        <video id="omnix-video" autoplay crossorigin="anonymous" data-shaka-player></video>

        <!-- Error Layer -->
        <div class="error-overlay" id="errorLayer">
            <div class="error-card">
                <i class="fa-solid fa-circle-exclamation"></i>
                <h2 id="errorHeading">Playback Failed</h2>
                <p id="errorMessage">This stream is currently unavailable or requires specific parameters not present.
                </p>
                <button class="retry-btn" onclick="location.reload()">RETRY CONNECTION</button>
            </div>
        </div>
    </div>

    <!-- Unified Logic -->
    <script src="player.js"></script>
</body>

</html>
