<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OMNIX PLAY</title>
    <!-- Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@500;700;900&display=swap"
        rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- HLS.js (primary for non-DRM streams: Fancode, M3U8) -->
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <!-- Shaka Player UI (used only for DRM/DASH streams) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.7/shaka-player.ui.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.7/controls.min.css">

    <style>
        :root {
            --neon-cyan: #66FCF1;
            --neon-blue: #45A29E;
            --dark-bg: #0B0C10;
            --glass-bg: rgba(31, 40, 51, 0.85);
            --live-red: #ff3333;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #000;
            color: #fff;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            position: relative;
        }



        /* ---- TOP BAR ---- */
        .player-top-bar {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            padding: 1.5rem 2rem;
            display: flex;
            align-items: center;
            background: linear-gradient(to bottom, rgba(0, 0, 0, 0.85) 0%, transparent 100%);
            z-index: 500;
            transition: opacity 0.4s ease;
        }

        .back-nav {
            background: var(--glass-bg);
            border: 1px solid rgba(102, 252, 241, 0.25);
            color: white;
            width: 44px;
            height: 44px;
            border-radius: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            backdrop-filter: blur(10px);
            margin-right: 1.5rem;
            transition: all 0.3s ease;
            font-size: 1.1rem;
        }

        .back-nav:hover {
            background: var(--neon-cyan);
            color: #000;
            transform: scale(1.1);
        }

        .stream-info {
            display: flex;
            flex-direction: column;
        }

        .stream-title {
            font-family: 'Outfit', sans-serif;
            font-size: 1.4rem;
            font-weight: 700;
            color: #fff;
            text-shadow: 0 2px 8px rgba(0, 0, 0, 0.6);
        }

        .stream-meta {
            font-size: 0.82rem;
            color: var(--neon-cyan);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-top: 3px;
            opacity: 0.85;
        }

        /* DRM Badge in top bar */
        .drm-badge {
            margin-left: auto;
            background: rgba(102, 252, 241, 0.1);
            border: 1px solid rgba(102, 252, 241, 0.3);
            color: var(--neon-cyan);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.78rem;
            font-weight: 600;
            display: none;
            align-items: center;
            gap: 6px;
            backdrop-filter: blur(8px);
        }

        .drm-badge.visible {
            display: flex;
        }

        /* ---- VIDEO ---- */
        #videoContainer {
            width: 100vw;
            height: 100vh;
            background: #000;
            position: relative;
        }

        #omnix-video {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        /* ---- ERROR ---- */
        .error-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.96);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 2rem;
            z-index: 1000;
        }

        .error-card {
            background: var(--glass-bg);
            padding: 3rem;
            border-radius: 24px;
            border: 1px solid rgba(255, 51, 51, 0.35);
            max-width: 560px;
            width: 100%;
            backdrop-filter: blur(20px);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
        }

        .error-card i {
            font-size: 3.5rem;
            color: var(--live-red);
            margin-bottom: 1.5rem;
            filter: drop-shadow(0 0 12px rgba(255, 51, 51, 0.5));
        }

        .error-card h2 {
            font-family: 'Outfit', sans-serif;
            font-size: 1.6rem;
            margin-bottom: 1rem;
        }

        .error-card p {
            color: #ccc;
            line-height: 1.65;
            margin-bottom: 2rem;
            font-size: 0.95rem;
        }

        .btn-row {
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
        }

        .retry-btn,
        .back-btn-err {
            border: none;
            padding: 0.9rem 1.8rem;
            border-radius: 12px;
            font-weight: 600;
            font-size: 0.95rem;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .retry-btn {
            background: var(--live-red);
            color: white;
        }

        .retry-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 51, 51, 0.4);
        }

        .back-btn-err {
            background: rgba(102, 252, 241, 0.12);
            color: var(--neon-cyan);
            border: 1px solid rgba(102, 252, 241, 0.3);
        }

        .back-btn-err:hover {
            background: rgba(102, 252, 241, 0.2);
            transform: translateY(-2px);
        }

        /* Shaka UI theme */
        .shaka-controls-container {
            font-family: 'Inter', sans-serif !important;
        }

        .shaka-range-element {
            --shaka-range-track-color: rgba(255, 255, 255, 0.15);
            --shaka-range-fill-color: var(--neon-cyan) !important;
        }
    </style>
</head>

<body>

    <!-- Top Bar -->
    <div class="player-top-bar" id="playerUIHead">
        <button class="back-nav" id="backBtn" title="Back to Sports Hub">
            <i class="fa-solid fa-chevron-left"></i>
        </button>
        <div class="stream-info">
            <h1 class="stream-title" id="displayTitle">PREMIUM STREAM</h1>
            <span class="stream-meta" id="displaySource">OMNIX NETWORK</span>
        </div>
        <div class="drm-badge" id="drmBadge">
            <i class="fa-solid fa-shield-halved"></i> DRM Protected
        </div>
    </div>

    <!-- Video Container -->
    <div id="videoContainer">
        <video id="omnix-video" autoplay playsinline></video>

        <!-- Error Layer -->
        <div class="error-overlay" id="errorLayer">
            <div class="error-card">
                <i class="fa-solid fa-circle-exclamation"></i>
                <h2 id="errorHeading">Playback Failed</h2>
                <p id="errorMessage">This stream is currently unavailable or requires specific parameters.</p>
                <div class="btn-row">
                    <button class="retry-btn" onclick="location.reload()">
                        <i class="fa-solid fa-rotate-right"></i> Retry
                    </button>
                    <button class="back-btn-err" id="backBtnErr">
                        <i class="fa-solid fa-chevron-left"></i> Sports Hub
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Player Logic -->
    <script src="player.js"></script>
    <script>
        // Wire back-btn-err (after player.js runs back is set in URL)
        document.getElementById('backBtnErr').addEventListener('click', () => {
            const p = new URLSearchParams(window.location.search);
            window.location.href = p.get('back') || 'Sports.html';
        });

        // Show DRM badge if drmLicenseUrl param present
        if (new URLSearchParams(window.location.search).get('drmLicenseUrl')) {
            document.getElementById('drmBadge').classList.add('visible');
        }
    </script>
    <script src="ads.js"></script>
</body>

</html>
