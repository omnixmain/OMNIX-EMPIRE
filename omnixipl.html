<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OMNIX IPL 2026</title>
    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <!-- Plyr CSS -->
    <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
    <style>
        :root {
            --bg-main: #080b12;
            --bg-card: rgba(255, 255, 255, 0.03);
            --bg-hover: rgba(255, 255, 255, 0.08);
            --primary: #00e5ff;
            --secondary: #ff007b;
            --text-main: #ffffff;
            --text-muted: #8b9bb4;
            --live-color: #ff2a2a;
            --border-light: rgba(255, 255, 255, 0.06);
        }
        
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            font-family: 'Outfit', sans-serif;
            overflow-x: hidden;
            background-image: radial-gradient(circle at top right, rgba(0, 229, 255, 0.05), transparent 40%),
                              radial-gradient(circle at bottom left, rgba(255, 0, 123, 0.05), transparent 40%);
        }

        /* Header */
        header {
            display: flex;
            align-items: center;
            padding: 1rem 2rem;
            border-bottom: 1px solid var(--border-light);
            background: rgba(8, 11, 18, 0.9);
            backdrop-filter: blur(15px);
            position: sticky;
            top: 0;
            z-index: 100;
            height: 70px;
        }

        header h1 {
            font-size: 1.8rem;
            font-weight: 800;
            margin: 0;
            background: linear-gradient(45deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
            letter-spacing: 2px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        /* Main YouTube Style Layout */
        .main-layout {
            display: flex;
            gap: 1.5rem;
            max-width: 1600px;
            margin: 0 auto;
            padding: 1.5rem;
            height: calc(100vh - 40px);
        }

        /* Left Column (Player) */
        .left-column {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            min-width: 0;
            overflow-y: auto;
        }

        .video-container {
            width: 100%;
            background: #000;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0,0,0,0.6);
            aspect-ratio: 16 / 9;
            flex-shrink: 0;
            border: 1px solid var(--border-light);
        }

        .plyr {
            width: 100%;
            height: 100%;
        }

        /* Status & Channels Bar (Right Column on Desktop) */
        .status-bar {
            width: 380px;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            background: var(--bg-card);
            border-radius: 16px;
            border: 1px solid var(--border-light);
            padding: 1.5rem;
            backdrop-filter: blur(10px);
            overflow-y: auto;
        }

        .status-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.2rem;
        }

        .status-header h2 {
            font-size: 1.3rem;
            font-weight: 600;
            margin: 0;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .status-header h2 i {
            color: var(--primary);
        }

        .live-indicator {
            background: rgba(255, 42, 42, 0.1);
            color: var(--live-color);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 800;
            display: flex;
            align-items: center;
            gap: 6px;
            border: 1px solid rgba(255, 42, 42, 0.3);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(255, 42, 42, 0.4); }
            70% { box-shadow: 0 0 0 6px rgba(255, 42, 42, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 42, 42, 0); }
        }

        /* Channel List */
        .channels-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
            gap: 1rem;
        }

        .channel-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(255,255,255,0.02);
            border: 1px solid var(--border-light);
            border-radius: 12px;
            padding: 1rem 0.5rem;
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: center;
        }

        .channel-item:hover {
            background: var(--bg-hover);
            transform: translateY(-2px);
        }

        .channel-item.active {
            background: rgba(0, 229, 255, 0.1);
            border-color: var(--primary);
            box-shadow: 0 5px 15px rgba(0, 229, 255, 0.15);
        }

        .channel-logo {
            width: 45px;
            height: 45px;
            object-fit: contain;
            margin-bottom: 0.8rem;
            background: rgba(255,255,255,0.8);
            border-radius: 10px;
            padding: 4px;
        }

        .channel-name {
            font-size: 0.85rem;
            font-weight: 600;
            color: #fff;
            width: 100%;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* Right Column (Match Cards) */
        .right-column {
            width: 420px;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            background: var(--bg-card);
            border-radius: 16px;
            border: 1px solid var(--border-light);
            backdrop-filter: blur(10px);
        }

        .matches-header {
            padding: 1.2rem 1.5rem;
            border-bottom: 1px solid var(--border-light);
            background: rgba(0,0,0,0.3);
            border-radius: 16px 16px 0 0;
        }

        .matches-header h2 {
            font-size: 1.2rem;
            margin: 0;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .matches-list {
            flex: 1;
            overflow-y: auto;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
        }

        /* Compact Match Card */
        .match-card {
            background: rgba(0,0,0,0.2);
            border-radius: 14px;
            padding: 1.2rem;
            border: 1px solid var(--border-light);
            transition: all 0.3s ease;
        }

        .match-card:hover {
            border-color: rgba(255, 255, 255, 0.15);
            background: rgba(0,0,0,0.4);
        }

        .match-card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        .badge {
            padding: 3px 8px;
            border-radius: 6px;
            font-weight: 700;
            font-size: 0.7rem;
            text-transform: uppercase;
        }

        .badge-upcoming { background: rgba(0, 229, 255, 0.1); color: var(--primary); }
        .badge-ended { background: rgba(255, 255, 255, 0.05); color: var(--text-muted); }

        .match-teams {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1rem;
        }

        .m-team {
            display: flex;
            align-items: center;
            gap: 10px;
            width: 40%;
        }
        
        .m-team.right {
            flex-direction: row-reverse;
            text-align: right;
        }

        .m-logo {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            background: rgba(255,255,255,0.05);
            padding: 4px;
            border: 1px solid var(--border-light);
        }

        .m-name {
            font-weight: 700;
            font-size: 1.1rem;
        }

        .m-score {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-top: 2px;
        }

        .m-vs {
            font-size: 0.9rem;
            font-weight: 800;
            color: rgba(255,255,255,0.2);
            font-style: italic;
        }

        .match-info {
            text-align: center;
            font-size: 0.85rem;
            color: var(--primary);
            font-weight: 500;
            padding-top: 0.8rem;
            border-top: 1px dashed var(--border-light);
        }

        /* Scrollbars */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.2); }

        /* Responsive */
        @media (max-width: 1200px) {
            .main-layout {
                flex-direction: column;
                height: auto;
            }
            .left-column {
                overflow-y: visible;
            }
            .status-bar {
                width: 100%;
                overflow: visible;
                padding: 1rem;
            }
            .channels-list {
                display: flex;
                flex-wrap: nowrap;
                overflow-x: auto;
                padding-bottom: 10px;
                scrollbar-width: none; /* Firefox */
            }
            .channels-list::-webkit-scrollbar {
                display: none; /* Safari/Chrome */
            }
            .channel-item {
                flex-shrink: 0;
                width: 130px;
            }
        }
        
        @media (max-width: 600px) {
            .main-layout { padding: 1rem; }
            .m-name { font-size: 0.9rem; }
            .m-logo { width: 30px; height: 30px; }
        }
    </style>
</head>

        const m3uData = atob(encodedM3u);

        // Parse M3U
        function parseM3U(data) {
            const lines = data.split('\n');
            const playlist = [];
            let currentItem = {};
            for (let line of lines) {
                line = line.trim();
                if (line.startsWith('#EXTINF')) {
                    const logoMatch = line.match(/tvg-logo="([^"]+)"/);
                    const titleMatch = line.match(/,(.+)$/);
                    currentItem.logo = logoMatch ? logoMatch[1] : 'https://ui-avatars.com/api/?name=TV&background=333&color=fff';
                    currentItem.name = titleMatch ? titleMatch[1] : 'Unknown';
                } else if (line && !line.startsWith('#')) {
                    currentItem.url = line;
                    playlist.push(currentItem);
                    currentItem = {};
                }
            }
            return playlist;
        }

        const playlist = parseM3U(m3uData);

        // Setup Player
        const video = document.getElementById('player');
        const player = new Plyr(video, {
            controls: ['play-large', 'play', 'progress', 'current-time', 'mute', 'volume', 'captions', 'settings', 'pip', 'airplay', 'fullscreen'],
            settings: ['quality', 'speed']
        });
        
        let hls = null;
        let tsPlayer = null;

        function playStream(url, title) {
            document.getElementById('current-channel-title').innerHTML = `<i class="fa-solid fa-satellite-dish"></i> ${title}`;
            
            if (hls) { hls.destroy(); hls = null; }
            if (tsPlayer) { tsPlayer.destroy(); tsPlayer = null; }

            if (url.includes('.m3u8')) {
                if (Hls.isSupported()) {
                    hls = new Hls({ maxBufferLength: 30, enableWorker: true });
                    hls.loadSource(url);
                    hls.attachMedia(video);
                    hls.on(Hls.Events.MANIFEST_PARSED, () => player.play());
                } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                    video.src = url;
                    video.addEventListener('loadedmetadata', () => player.play());
                }
            } else {
                if (mpegts.getFeatureList().mseLivePlayback) {
                    tsPlayer = mpegts.createPlayer({ type: 'mpegts', isLive: true, url: url });
                    tsPlayer.attachMediaElement(video);
                    tsPlayer.load();
                    tsPlayer.play();
                } else {
                    video.src = url;
                    video.play();
                }
            }
        }

        // Render Playlist Bar
        const playlistContainer = document.getElementById('playlist-container');
        playlist.forEach((item) => {
            const el = document.createElement('div');
            el.className = 'channel-item';
            el.innerHTML = `
                <img src="${item.logo}" class="channel-logo" onerror="this.src='https://ui-avatars.com/api/?name=TV&background=333&color=fff'">
                <div class="channel-name">${item.name}</div>
            `;
            el.addEventListener('click', () => {
                document.querySelectorAll('.channel-item').forEach(c => c.classList.remove('active'));
                el.classList.add('active');
                playStream(item.url, item.name);
            });
            playlistContainer.appendChild(el);
        });

        // Auto click first item
        if (playlist.length > 0) {
            document.querySelector('.channel-item').click();
        }

    </script>
