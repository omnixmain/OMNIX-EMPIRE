        // Render Categories dynamically in the sidebar
        function renderSidebar() {
            // Get unique categories and sort them alphabetically
            const categories = Object.keys(tvData).sort();

            // "All" View
            categoryListObj.appendChild(createCategoryItem('All', allChannels.length, true));

            // Other Categories
            categories.forEach(cat => {
                const count = tvData[cat] ? tvData[cat].length : 0;
                if (count > 0) {
                    categoryListObj.appendChild(createCategoryItem(cat, count, false));
                }
            });
        }

        // Helper to create category list elements
        function createCategoryItem(catName, count, isActive) {
            const li = document.createElement('li');
            li.className = 'category-item' + (isActive ? ' active' : '');
            li.textContent = catName;

            li.onclick = () => {
                // Update styling classes
                document.querySelectorAll('.category-item').forEach(e => e.classList.remove('active'));
                li.classList.add('active');

                // Update state and re-render
                currentCategory = catName;
                searchInput.value = ''; // clear search when switching
                renderChannels(catName);

                // Scroll main content to top
                document.getElementById('mainContent').scrollTop = 0;
            };
            return li;
        }

        // Render the Grid of Channels based on Category and Search text
        function renderChannels(categoryFilter, searchText = '') {
            channelsContainer.innerHTML = '';

            // Filter Channels
            let filtered = allChannels;

            if (categoryFilter !== 'All') {
                filtered = filtered.filter(ch => ch.category === categoryFilter);
            }
            if (searchText.trim() !== '') {
                const q = searchText.toLowerCase();
                filtered = filtered.filter(ch =>
                    ch.name.toLowerCase().includes(q) ||
                    ch.category.toLowerCase().includes(q)
                );
            }

            // Fallback for empty results
            if (filtered.length === 0) {
                channelsContainer.innerHTML = `
                    <div style="text-align:center; padding: 50px; color: #777;">
                        <i class="fa-solid fa-box-open fa-3x" style="margin-bottom:15px;"></i>
                        <h3>No channels found</h3>
                        <p>Try exploring another category or clearing your search.</p>
                    </div>
                `;
                return;
            }

            // Create a single grid for all channels to ensure proper alignment
            const grid = document.createElement('div');
            grid.className = 'channels-grid';

            filtered.forEach(ch => {
                const card = document.createElement('div');
                card.className = 'channel-card';
                card.onclick = () => playChannel(ch);

                const safeLogo = ch.logo || 'https://via.placeholder.com/200x120?text=TV';

                card.innerHTML = `
                    <div class="channel-logo-container">
                        <img src="${safeLogo}" alt="${ch.name}" loading="lazy" onerror="this.src='https://via.placeholder.com/200x120?text=No+Logo'">
                    </div>
                    <div class="channel-name" title="${ch.name}">${ch.name}</div>
                    <div class="play-overlay"><i class="fa-solid fa-play"></i></div>
                `;
                grid.appendChild(card);
            });

            channelsContainer.appendChild(grid);
        }

        // Logic to play the selected channel
        function playChannel(ch) {
            window.adsPaused = true;
            // Update Overlay UI
            document.getElementById('npTitle').textContent = ch.name;
            document.getElementById('npCategory').innerHTML = `<i class="fa-solid fa-layer-group"></i> ${ch.category}`;
            
            // Show Overlay
            const overlay = document.getElementById('playerOverlay');
            overlay.classList.add('active');

            const video = document.getElementById('tvPlayer');
            let streamUrl = ch.url;

            // Handle cors required domains (fallback logic)
            const proxyRequired = streamUrl.includes('sportsbd') || streamUrl.includes('webiptv');
            if (proxyRequired && !streamUrl.includes('corsproxy.io')) {
                streamUrl = 'https://corsproxy.io/?' + encodeURIComponent(streamUrl);
            }

            // Cleanup previous HLS instance
            if (hlsPlayer) {
                hlsPlayer.destroy();
                hlsPlayer = null;
            }

            video.src = '';

            // Check if M3U8 and HLS.js is supported
            if (streamUrl.toLowerCase().includes('.m3u8') || streamUrl.toLowerCase().includes('.m3u')) {
                if (Hls.isSupported()) {
                    hlsPlayer = new Hls({ 
                        maxLoadingRetry: 3, 
                        manifestLoadingTimeOut: 10000,
                        autoStartLoad: true
                    });
                    hlsPlayer.loadSource(streamUrl);
                    hlsPlayer.attachMedia(video);

                    hlsPlayer.on(Hls.Events.MANIFEST_PARSED, function () {
                        video.play().catch(e => console.warn("Auto-play prevented", e));
                    });

                    hlsPlayer.on(Hls.Events.ERROR, function (event, data) {
                        if (data.fatal) {
                            switch (data.type) {
                                case Hls.ErrorTypes.NETWORK_ERROR:
                                    hlsPlayer.startLoad();
                                    break;
                                case Hls.ErrorTypes.MEDIA_ERROR:
                                    hlsPlayer.recoverMediaError();
                                    break;
                                default:
                                    hlsPlayer.destroy();
                                    break;
                            }
                        }
                    });

                } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                    video.src = streamUrl;
                    video.play().catch(e => console.warn("Auto-play prevented", e));
                }
            } else {
                video.src = streamUrl;
                video.play().catch(e => console.warn("Auto-play prevented", e));
            }
        }

        // Close Player Logic
        function closePlayer() {
            window.adsPaused = false;
            const overlay = document.getElementById('playerOverlay');
            const video = document.getElementById('tvPlayer');
            
            overlay.classList.remove('active');
            video.pause();
            video.src = '';
            
            if (hlsPlayer) {
                hlsPlayer.destroy();
                hlsPlayer = null;
            }
        }

        // Search Input Listener
        searchInput.addEventListener('input', (e) => {
            renderChannels(currentCategory, e.target.value);
        });

        // Initialize App
        window.onload = initApp;
