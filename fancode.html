    <script>
        // Configuration
        const API_URL = 'https://raw.githubusercontent.com/jitendra-unatti/fancode/fe98437cfea2582b6c6153f990b112467ad1ec63/data/fancode.json';

        // State
        let allMatches = [];
        let categories = new Set();
        let currentCategory = 'all';

        // DOM Elements
        const matchesContainer = document.getElementById('matches-container');
        const loadingState = document.getElementById('loading-state');
        const noMatchesState = document.getElementById('no-matches-state');
        const categoryFilters = document.getElementById('category-filters');
        const liveCounter = document.getElementById('live-counter');

        // ---------------------------------------------------------------
        // Fancode auto_streams M3U8 quality picker
        // Extracts best available quality URL from the M3U8 playlist text
        // Priority: 1080p > 720p > 540p > 480p > 360p > 240p > first URL
        // ---------------------------------------------------------------
        function extractBestQualityUrl(m3u8Text) {
            if (!m3u8Text) return null;
            const lines = m3u8Text.split('\n').map(l => l.trim()).filter(l => l);
            const qualityOrder = ['1080p', '720p', '540p', '480p', '360p', '240p'];

            // Build a map: quality label → URL
            const qualityMap = {};
            for (let i = 0; i < lines.length; i++) {
                if (lines[i].startsWith('#EXT-X-STREAM-INF') && lines[i + 1] && !lines[i + 1].startsWith('#')) {
                    const url = lines[i + 1];
                    for (const q of qualityOrder) {
                        if (url.includes('/' + q + '.m3u8') || url.includes('_' + q) || url.includes(q + '.')) {
                            qualityMap[q] = url;
                            break;
                        }
                    }
                    // Fallback: store first found URL
                    if (!qualityMap['_first']) qualityMap['_first'] = url;
                }
            }

            // Return best available
            for (const q of qualityOrder) {
                if (qualityMap[q]) return qualityMap[q];
            }
            return qualityMap['_first'] || null;
        }

        // ------------------------------------------------------------
        // Play functionality — 3-layer URL priority for Fancode
        // Layer 1: STREAMING_CDN clean URL (no expiring token)
        // Layer 2: auto_streams blob fallback (full M3U8 text)
        // Layer 3: error alert
        // ------------------------------------------------------------
        window.playMatch = function (matchIdStr, titleStr, categoryStr) {
            const match = allMatches.find(m => m.match_id.toString() === matchIdStr);
            if (!match) return;

            const language = (match.auto_streams && match.auto_streams[0] && match.auto_streams[0].language) || 'ENGLISH';
            const safeTitle = encodeURIComponent(titleStr);
            const safeCat = encodeURIComponent(categoryStr || 'Sports');
            const safeSource = 'Fancode+' + encodeURIComponent(language);

            // Fancode CDN requires these headers via proxy
            const fancodeHeaders = {
                'Referer': 'https://fancode.com/',
                'User-Agent': 'ReactNativeVideo/9.3.0 (Linux;Android 13) AndroidXMedia3/1.6.1'
            };
            const headersParam = encodeURIComponent(JSON.stringify(fancodeHeaders));
            const baseParams = '&title=' + safeTitle + '&source=' + safeSource
                + '&category=' + safeCat + '&headers=' + headersParam
                + '&back=fancode.html';

            // ── Layer 1: auto_streams M3U8 blob (adaptive multi-quality, hdntl token) ──
            if (match.auto_streams && match.auto_streams.length > 0 && match.auto_streams[0].auto) {
                const streamData = match.auto_streams[0].auto;
                const sid = 'fc_' + matchIdStr;
                sessionStorage.setItem(sid, streamData);
                window.location.href = 'fancode-player.html?streamUrl=session:' + sid + baseParams;
                return;
            }

            // ── Layer 2: STREAMING_CDN clean index.m3u8 (no hdntl token = never expires) ──
            const cdn = match.STREAMING_CDN;
            const cleanUrl = cdn && (cdn.fancode_cdn || cdn.Primary_Playback_URL || cdn.fancode_bd_cdn);
            if (cleanUrl && cleanUrl !== 'Unavailable') {
                // Pass the raw URL instead of proxying it here.
                // fancode-player.html automatically intercepts and proxies Fancode URLs via xhrSetup
                // which allows hls.js to correctly resolve relative segment/playlist URLs.
                window.location.href = 'fancode-player.html?streamUrl=' + encodeURIComponent(cleanUrl) + baseParams;
                return;
            }

            // ── Layer 3: No stream ──
            alert('No stream available for this match yet. Please wait for the event to go live.');
        };

        document.addEventListener('DOMContentLoaded', fetchMatches);

        async function fetchMatches() {
            try {
                const response = await fetch(API_URL);
                if (!response.ok) throw new Error('Failed to fetch data');
                const data = await response.json();

                if (data && data.matches && Array.isArray(data.matches)) {
                    allMatches = data.matches;
                    const liveCount = allMatches.filter(m => m.status === 'LIVE' || m.streamingStatus === 'STARTED').length;
                    const totalCount = allMatches.length;

                    liveCounter.innerHTML = '<span class="bg-red-500 w-2 h-2 rounded-full inline-block mr-2 animate-pulse"></span> ' + liveCount + ' Live / ' + totalCount + ' Total Events';
                    liveCounter.classList.remove('bg-white/20');
                    liveCounter.classList.add('bg-white/30', 'border', 'border-white/40');

                    allMatches.forEach(match => {
                        if (match.category) categories.add(match.category);
                    });

                    renderCategories();
                    renderMatches(allMatches);
                } else {
                    throw new Error('Invalid data format');
                }
            } catch (error) {
                console.error('Error fetching matches:', error);
                liveCounter.innerHTML = '<i class="fas fa-exclamation-triangle mr-2 text-red-300"></i> Error loading events';
                loadingState.innerHTML =
                    '<div class="text-red-500 text-5xl mb-4"><i class="fas fa-plug-circle-xmark"></i></div>' +
                    '<p class="text-gray-800 text-lg font-bold mb-2">Failed to load data</p>' +
                    '<p class="text-gray-500 text-sm">Please check your internet connection and try again.</p>' +
                    '<button onclick="location.reload()" class="mt-4 px-4 py-2 bg-blue-600 text-white rounded-lg shadow hover:bg-blue-700 transition">Retry</button>';
            }
        }

        function renderCategories() {
            categoryFilters.innerHTML = '<button class="category-filter-btn px-5 py-2 rounded-full bg-blue-600 text-white text-sm font-medium transition-all shadow border border-transparent" data-category="all"><i class="fas fa-globe mr-2"></i>All Events</button>';

            const getCategoryIcon = (cat) => {
                const lower = cat.toLowerCase();
                if (lower.includes('cricket')) return 'fa-baseball-bat-ball';
                if (lower.includes('football') || lower.includes('soccer')) return 'fa-futbol';
                if (lower.includes('basketball')) return 'fa-basketball';
                if (lower.includes('tennis')) return 'fa-baseball';
                if (lower.includes('kabaddi')) return 'fa-person-running';
                if (lower.includes('hockey')) return 'fa-hockey-puck';
                return 'fa-trophy';
            };

            Array.from(categories).sort().forEach(category => {
                const btn = document.createElement('button');
                btn.className = 'category-filter-btn px-5 py-2 rounded-full bg-[#1a1a1a] text-[#e0e0e0] hover:bg-[#2a2a2a] text-sm font-medium transition-all border border-[#333]';
                btn.dataset.category = category;
                btn.innerHTML = '<i class="fas ' + getCategoryIcon(category) + ' mr-2 text-[#d4af37]/70"></i> ' + category;

                btn.addEventListener('click', () => {
                    document.querySelectorAll('.category-filter-btn').forEach(b => {
                        b.className = 'category-filter-btn px-5 py-2 rounded-full bg-[#1a1a1a] text-[#e0e0e0] hover:bg-[#2a2a2a] text-sm font-medium transition-all border border-[#333]';
                        const icon = b.querySelector('i');
                        if (icon) {
                            icon.classList.remove('text-black');
                            icon.classList.add('text-[#d4af37]/70');
                        }
                    });
                    btn.className = 'category-filter-btn px-5 py-2 rounded-full bg-gradient-to-r from-[#d4af37] to-[#b8860b] text-black text-sm font-bold transition-all shadow-[0_2px_10px_rgba(212,175,55,0.3)] border border-transparent';
                    const btnIcon = btn.querySelector('i');
                    if (btnIcon) {
                        btnIcon.classList.remove('text-[#d4af37]/70');
                        btnIcon.classList.add('text-black');
                    }
                    currentCategory = category;
                    filterAndRenderMatches();
                });

                categoryFilters.appendChild(btn);
            });

            const allBtn = categoryFilters.querySelector('[data-category="all"]');
            allBtn.addEventListener('click', () => {
                document.querySelectorAll('.category-filter-btn').forEach(b => {
                    b.className = 'category-filter-btn px-5 py-2 rounded-full bg-[#1a1a1a] text-[#e0e0e0] hover:bg-[#2a2a2a] text-sm font-medium transition-all border border-[#333]';
                    const icon = b.querySelector('i');
                    if (icon) {
                        icon.classList.remove('text-black');
                        icon.classList.add('text-[#d4af37]/70');
                    }
                });
                allBtn.className = 'category-filter-btn px-5 py-2 rounded-full bg-gradient-to-r from-[#d4af37] to-[#b8860b] text-black text-sm font-bold transition-all shadow-[0_2px_10px_rgba(212,175,55,0.3)] border border-transparent';
                const allBtnIcon = allBtn.querySelector('i');
                if (allBtnIcon) {
                    allBtnIcon.classList.remove('text-[#d4af37]/70');
                    allBtnIcon.classList.add('text-black');
                }
                currentCategory = 'all';
                filterAndRenderMatches();
            });
        }

        function filterAndRenderMatches() {
            if (currentCategory === 'all') {
                renderMatches(allMatches);
            } else {
                renderMatches(allMatches.filter(m => m.category === currentCategory));
            }
        }

        function renderMatches(matches) {
            matchesContainer.innerHTML = '';

            if (matches.length === 0) {
                noMatchesState.classList.remove('hidden');
                noMatchesState.classList.add('flex');
                return;
            }

            noMatchesState.classList.add('hidden');
            noMatchesState.classList.remove('flex');

            matches.forEach((match, index) => {
                const isLive = match.status === 'LIVE' || match.streamingStatus === 'STARTED' || match.status === 'IN_PROGRESS';

                let imageUrl = 'https://placehold.co/600x338/1e3a8a/ffffff?text=Fancode+Event';
                let fallbackUrl = imageUrl;
                if (match.image_cdn) {
                    imageUrl = match.image_cdn.APP || match.image_cdn.SPORTS || match.image_cdn.CLOUDFARE || match.image_cdn.TATAPLAY || match.image || imageUrl;
                    fallbackUrl = match.image_cdn.CLOUDFARE || match.image || fallbackUrl;
                } else if (match.image) {
                    imageUrl = match.image;
                }

                let matchTeamsHtml = '';
                if (match.team && match.team.length >= 2) {
                    const team1 = match.team[0];
                    const team2 = match.team[1];
                    const flag1 = team1.flag ? team1.flag.src : 'https://placehold.co/100x100/eeeeee/999999?text=' + (team1.shortName || 'T1');
                    const flag2 = team2.flag ? team2.flag.src : 'https://placehold.co/100x100/eeeeee/999999?text=' + (team2.shortName || 'T2');

                    let scoreText = '';
                    if (team1.cricketScore && team1.cricketScore.length > 0) {
                        const s = team1.cricketScore[0];
                        scoreText = '<div class="text-[10px] font-bold text-center mt-3 text-white/90 drop-shadow-md pb-1">' + s.runs + '/' + s.wickets + ' <span class="text-white/60 font-normal">(' + s.overs + ')</span></div>';
                    }

                    matchTeamsHtml =
                        '<div class="flex flex-col relative z-20 mt-6">' +
                        '<div class="flex justify-between items-center w-full px-2">' +
                        '<!-- Team 1 -->' +
                        '<div class="flex flex-col items-center gap-2 w-[40%]">' +
                        '<div class="w-12 h-12 rounded-full bg-white shadow-xl flex items-center justify-center p-1 border-2 border-white/20">' +
                        '<img src="' + flag1 + '" alt="' + (team1.shortName || '') + '" class="w-full h-full object-contain" />' +
                        '</div>' +
                        '<span class="text-[11px] sm:text-xs font-bold text-white text-center w-full truncate drop-shadow-md mt-1 block" title="' + (team1.name || team1.shortName) + '">' +
                        (team1.name || team1.shortName) +
                        '</span>' +
                        '</div>' +

                        '<!-- VS -->' +
                        '<div class="flex flex-col items-center justify-center">' +
                        '<img src="https://images.fancode.com/skillup-uploads/fc-web-logo/vs_icon.png" onerror="this.src=\'https://placehold.co/40x40/transparent/ffaa00?text=VS\'" style="width: 35px; height: 35px; object-fit: contain; filter: drop-shadow(0 4px 5px rgba(0,0,0,0.6));" alt="VS" />' +
                        '</div>' +

                        '<!-- Team 2 -->' +
                        '<div class="flex flex-col items-center gap-2 w-[40%]">' +
                        '<div class="w-12 h-12 rounded-full bg-white shadow-xl flex items-center justify-center p-1 border-2 border-white/20">' +
                        '<img src="' + flag2 + '" alt="' + (team2.shortName || '') + '" class="w-full h-full object-contain" />' +
                        '</div>' +
                        '<span class="text-[11px] sm:text-xs font-bold text-white text-center w-full truncate drop-shadow-md mt-1 block" title="' + (team2.name || team2.shortName) + '">' +
                        (team2.name || team2.shortName) +
                        '</span>' +
                        '</div>' +
                        '</div>' +
                        scoreText +
                        '</div>';
                }

                const isLiveStatus = (match.status === 'LIVE' || match.streamingStatus === 'STARTED' || match.status === 'IN_PROGRESS');

                const liveBadge = isLiveStatus
                    ? '<div class="px-4 py-1.5 bg-[#f03b3b] text-white text-[10px] font-bold rounded-full flex items-center shadow-[0_2px_8px_rgba(240,59,59,0.5)] tracking-widest border border-transparent">LIVE</div>'
                    : '<div class="px-4 py-1.5 bg-[#141414] text-white text-[10px] font-bold rounded-full shadow-md border border-white/10 tracking-widest">UPCOMING</div>';

                const safeTitle = (match.title || '').replace(/'/g, "\\'").replace(/"/g, '&quot;');

                const cardHtml =
                    '<div class="relative rounded-3xl shadow-2xl hover:shadow-[0_10px_30px_rgba(255,100,50,0.15)] transition-all duration-300 flex flex-col fade-in overflow-hidden group border border-white/5 bg-[#141414] w-full min-h-[340px] sm:min-h-[370px]"' +
                    'style="animation-delay:' + (index * 0.05) + 's">' +

                    '<!-- Background Image Overlay -->' +
                    '<div class="absolute inset-0 w-full h-full z-0">' +
                    '<img src="' + imageUrl + '" class="w-full h-full object-cover opacity-[0.35] transition-transform duration-1000 group-hover:scale-110" alt="Match Cover" loading="lazy" onerror="this.onerror=null;this.src=\'' + fallbackUrl + '\';" />' +
                    '<div class="absolute inset-0 bg-gradient-to-b from-[#181818]/60 via-[#141414]/80 to-[#141414]"></div>' +
                    '<div class="absolute inset-0 bg-gradient-to-t from-[#141414] via-transparent to-transparent"></div>' +
                    '</div>' +

                    '<!-- Top Container: Status & Category info -->' +
                    '<div class="flex justify-between items-start pt-4 px-4 w-full relative z-10">' +
                    '<!-- Left: Status -->' +
                    liveBadge +

                    '<!-- Right: League/Category -->' +
                    '<div class="flex flex-col items-end gap-1 text-right max-w-[55%]">' +
                    '<div class="text-white font-bold text-[11px] sm:text-[12px] tracking-wide drop-shadow-md truncate w-full">' +
                    (match.tournament || match.category || 'Sports') +
                    '</div>' +
                    '<div class="text-[#c1c1c1] font-semibold text-[9px] uppercase tracking-widest truncate w-full">' +
                    (match.category || 'Event') +
                    '</div>' +
                    '</div>' +
                    '</div>' +

                    '<!-- Body Content -->' +
                    '<div class="px-4 pb-4 flex-grow flex flex-col relative z-20 justify-end pt-2">' +

                    matchTeamsHtml +

                    '<!-- Bottom Info (Title & Time) -->' +
                    '<div class="text-center mt-3 mb-4 w-full px-2">' +
                    '<h3 class="font-bold text-white text-[13px] sm:text-[14px] leading-snug truncate drop-shadow-md w-full" title="' + (match.title || '') + '">' +
                    (match.title || '') +
                    '</h3>' +
                    '<div class="text-[#999999] text-[10px] sm:text-[11px] mt-1.5 font-medium tracking-wide">' +
                    (match.startTime || 'Scheduled') +
                    '</div>' +
                    '</div>' +

                    '<!-- Watch Now Button -->' +
                    '<div class="mt-auto items-end w-full">' +
                    '<button onclick="playMatch(\'' + match.match_id + '\',\'' + safeTitle + '\',\'' + (match.category || 'Sports') + '\')" ' +
                    'class="flex items-center justify-center w-full py-2.5 sm:py-3 bg-gradient-to-r from-[#ff512f] to-[#f09819] text-white font-bold text-[13px] rounded-full transition-all duration-300 transform hover:scale-[1.03] shadow-[0_6px_20px_rgba(255,81,47,0.3)] hover:shadow-[0_8px_25px_rgba(255,81,47,0.5)] border border-[#ff512f]/20">' +
                    '<i class="fas fa-play-circle mr-2 text-[16px]"></i> Watch Now' +
                    '</button>' +
                    '</div>' +
                    '</div>' +
                    '</div>';

                const wrapper = document.createElement('div');
                wrapper.innerHTML = cardHtml;
                matchesContainer.appendChild(wrapper.firstChild);
            });
        }
    </script>
</body>

</html>
