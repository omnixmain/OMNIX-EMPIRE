<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OMNIX LIVE HUB</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@500;700;900&display=swap"
        rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">

    <style>
        /* ── Footer ─────────────────────────────── */
        .app-footer {
            background: rgba(11, 12, 16, 0.92);
            backdrop-filter: blur(16px);
            border-top: 1px solid rgba(102, 252, 241, 0.1);
            padding: 1.6rem 1.5rem 1.2rem;
            text-align: center;
        }

        .social-btns {
            display: flex;
            justify-content: center;
            gap: 1rem;
            margin-bottom: 1rem;
        }

        .social-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 0.55rem 1.4rem;
            border-radius: 30px;
            font-family: 'Outfit', sans-serif;
            font-weight: 700;
            font-size: 0.9rem;
            text-decoration: none;
            border: 1.5px solid transparent;
            transition: all 0.3s ease;
            letter-spacing: 0.5px;
        }

        /* Instagram */
        .social-btn.instagram {
            background: linear-gradient(135deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888);
            color: #fff;
            border-color: transparent;
            box-shadow: 0 0 14px rgba(220, 39, 67, 0.35);
        }

        .social-btn.instagram:hover {
            transform: translateY(-3px);
            box-shadow: 0 0 22px rgba(220, 39, 67, 0.6);
            filter: brightness(1.1);
        }

        /* Telegram */
        .social-btn.telegram {
            background: #0088cc;
            color: #fff;
            border-color: transparent;
            box-shadow: 0 0 14px rgba(0, 136, 204, 0.35);
        }

        .social-btn.telegram:hover {
            transform: translateY(-3px);
            box-shadow: 0 0 22px rgba(0, 136, 204, 0.6);
            filter: brightness(1.15);
        }

        .social-btn i {
            font-size: 1rem;
        }

        .footer-copy {
            color: rgba(197, 198, 199, 0.6);
            font-size: 0.78rem;
            letter-spacing: 0.3px;
        }

        /* ── Header center fix ───────────────────── */
        .app-header {
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .back-btn {
            position: absolute;
            left: 1.5rem;
        }

        .search-bar {
            position: absolute;
            right: 1.5rem;
            justify-self: unset;
        }

        /* ── Responsive ──────────────────────────── */
        @media (max-width: 600px) {
            .social-btns {
                flex-direction: column;
                align-items: center;
            }

            .social-btn {
                width: 200px;
                justify-content: center;
            }

            .back-btn {
                left: 1rem;
            }

            .search-bar {
                right: 1rem;
                width: 130px;
            }
        }
    </style>
</head>

<body>
    <!-- Navbar / Header -->
    <header class="app-header">
        <!-- ✦ Centered Brand Name ✦ -->
        <div class="logo-container" onclick="goHome()">
            <span>OMNIX LIVE HUB</span>
        </div>
    </header>

    <!-- Main Content -->
    <main class="main-content">
        <!-- Dashboard (Providers List) -->
        <div id="dashboardView" class="view-section">
            <div class="provider-grid" id="providerGrid">
                <!-- Provider cards dynamically injected over here -->
            </div>
        </div>

        <!-- Events List -->
        <div id="eventsView" class="view-section hidden">
            <!-- Filter Options for non-TV events -->
            <div class="filters-container">
                <ul class="status-links" id="statusFilters">
                    <li class="active" data-status="all">All</li>
                    <li data-status="LIVE">Live</li>
                    <li data-status="UPCOMING">Upcoming</li>
                    <li data-status="COMPLETED">Completed</li>
                </ul>
            </div>

            <div id="eventsGrid" class="events-grid">
                <!-- Events or Channels list -->
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="app-footer">
        <div class="social-btns">
            <a href="https://www.instagram.com/omnix_empire/" target="_blank" rel="noopener"
                class="social-btn instagram">
                <i class="fa-brands fa-instagram"></i> Instagram
            </a>
            <a href="https://t.me/omnix_Empire" target="_blank" rel="noopener" class="social-btn telegram">
                <i class="fa-brands fa-telegram"></i> Telegram
            </a>
        </div>
        <p class="footer-copy">© 2026 OMNIX LIVE HUB. All rights reserved.</p>
    </footer>

    <!-- Custom JS -->
    <script src="app.js"></script>
    <script src="ads.js"></script>
</body>

</html>
